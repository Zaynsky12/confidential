specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ConfidentialTrading
    network: arc-testnet
    source:
      address: "0xd9f796201d93dC5eb499B0044a675cB24eB550f9"
      abi: ConfidentialTrading
      startBlock: 1
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Position
        - Order
        - TradeRecord
      abis:
        - name: ConfidentialTrading
          file: ../src/abis/ConfidentialTrading.json
      eventHandlers:
        - event: PositionOpened(indexed uint256,indexed address,bytes32,bool,uint256,uint256,uint256)
          handler: handlePositionOpened
        - event: PositionClosed(indexed uint256,indexed address,uint256,int256)
          handler: handlePositionClosed
        - event: PositionLiquidated(indexed uint256,indexed address,uint256,indexed address,uint256)
          handler: handlePositionLiquidated
        - event: OrderPlaced(indexed uint256,indexed address,bytes32,uint8,uint256)
          handler: handleOrderPlaced
        - event: OrderCancelled(indexed uint256)
          handler: handleOrderCancelled
        - event: OrderExecuted(indexed uint256,indexed uint256)
          handler: handleOrderExecuted
        - event: TWAPSliceExecuted(indexed uint256,uint256,uint256)
          handler: handleTWAPSliceExecuted
        - event: TPSLTriggered(indexed uint256,bool,uint256)
          handler: handleTPSLTriggered
      file: ./src/mapping.ts

  - kind: ethereum
    name: ConfidentialVault
    network: arc-testnet
    source:
      address: "0x3E31b55226cfcd3E18037AE71EA1cbfa2FAFd8d7"
      abi: ConfidentialVault
      startBlock: 1
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultDeposit
      abis:
        - name: ConfidentialVault
          file: ../src/abis/ConfidentialVault.json
      eventHandlers:
        - event: Deposit(indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,uint256,uint256)
          handler: handleWithdraw
      file: ./src/mapping.ts
